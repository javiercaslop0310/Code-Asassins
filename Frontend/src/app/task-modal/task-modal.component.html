<div class="tf-backdrop" (click)="close()">
  <div class="tf-modal" (click)="$event.stopPropagation()">

    <div class="tf-modal-header">
      <div>
        <span class="tf-eyebrow">Gestión diaria</span>
        <h2>Nueva tarea</h2>
      </div>
      <button class="tf-close" (click)="close()" [disabled]="isSaving()">✕</button>
    </div>

    <div class="tf-modal-body">

      <div class="tf-field">
        <label>Título <span class="tf-required">*</span></label>
        <input
          type="text"
          placeholder="Ej: Implementar endpoint GET /tareas"
          [(ngModel)]="titulo"
          [disabled]="isSaving()"
        />
      </div>

      <div class="tf-field">
        <label>Descripción</label>
        <textarea
          placeholder="Descripción opcional..."
          rows="3"
          [(ngModel)]="descripcion"
          [disabled]="isSaving()"
        ></textarea>
      </div>

      <!-- Proyecto (obligatorio por el backend) -->
      <div class="tf-field">
        <label>Proyecto <span class="tf-required">*</span></label>
        @if (loadingProyectos()) {
          <div class="tf-loading">Cargando proyectos…</div>
        } @else if (proyectosDisponibles.length === 0) {
          <div class="tf-warning">⚠ No hay proyectos. Crea uno antes de añadir tareas.</div>
        } @else {
          <select [(ngModel)]="proyectoId" [disabled]="isSaving()">
            @for (p of proyectosDisponibles; track p.id) {
              <option [value]="p.id">{{ p.nombre }}</option>
            }
          </select>
        }
      </div>

      <div class="tf-field-row">
        <div class="tf-field">
          <label>Estado</label>
          <select [(ngModel)]="estado" [disabled]="isSaving()">
            <option value="PENDIENTE">Pendiente</option>
            <option value="EN PROGRESO">En progreso</option>
            <option value="COMPLETADA">Completada</option>
          </select>
        </div>
        <div class="tf-field">
          <label>Prioridad</label>
          <select [(ngModel)]="prioridad" [disabled]="isSaving()">
            <option value="BAJA">Baja</option>
            <option value="MEDIA">Media</option>
            <option value="ALTA">Alta</option>
            <option value="URGENTE">Urgente</option>
          </select>
        </div>
      </div>

      <div class="tf-field">
        <label>Fecha límite</label>
        <input
          type="date"
          [(ngModel)]="fechaLimite"
          [disabled]="isSaving()"
        />
      </div>

      @if (saveError()) {
        <div class="tf-error">⚠ {{ saveError() }}</div>
      }
    </div>

    <div class="tf-modal-footer">
      <button class="tf-btn-cancel" (click)="close()" [disabled]="isSaving()">Cancelar</button>
      <button
        class="tf-btn-save"
        (click)="submit()"
        [disabled]="isSaving() || loadingProyectos() || proyectosDisponibles.length === 0"
      >
        @if (isSaving()) {
          <span class="tf-spinner"></span> Guardando…
        } @else {
          Crear tarea
        }
      </button>
    </div>

  </div>
</div>
